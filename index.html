<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة صيانة نيوال</title>
    <style>
        :root { --primary: #1B365D; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; color: var(--primary); }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .full-width { grid-column: span 2; }
        .actions { text-align: center; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        button { padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-print { background-color: var(--primary); color: #fff; }
        .btn-pdf { background-color: #c0392b; color: #fff; }
        .btn-save { background-color: #27ae60; color: #fff; }

        @media print {
            .no-print { display: none; }
            .print-area { display: block !important; width: 100%; }
            .invoice-print { width: 100%; border-collapse: collapse; }
            .invoice-print th, .invoice-print td { border: 1px solid #000; padding: 10px; text-align: center; }
            .invoice-header { text-align: center; margin-bottom: 20px; }
        }
        .print-area { display: none; }
    </style>
</head>
<body>

<div class="container no-print">
    <h1>نظام صيانة نيوال</h1>
    <div class="form-grid">
        <div class="form-group"><label>رقم الفاتورة:</label><input type="text" id="refNo" value="1001"></div>
        <div class="form-group"><label>تاريخ التسجيل:</label><input type="date" id="dateReg"></div>
        <div class="form-group"><label>اسم الزبون:</label><input type="text" id="custName"></div>
        <div class="form-group"><label>رقم الهاتف:</label><input type="text" id="phone"></div>
        <div class="form-group full-width"><label>حالة الضمان:</label>
            <select id="status"><option value="ضمان">ضمان</option><option value="خارج الضمان">خارج الضمان</option></select>
        </div>
        <div class="form-group full-width"><label>الموديل:</label><input type="text" id="modelNo"></div>
        <div class="form-group full-width"><label>رقم السيريال:</label><input type="text" id="serialNo"></div>
    </div>
    <div class="actions">
        <button class="btn-print" onclick="window.print()">طباعة الفاتورة 🖨️</button>
        <button class="btn-pdf" onclick="window.print()">حفظ كـ PDF 💾</button>
        <button class="btn-save" onclick="saveData()">حفظ السجل (CSV) 📊</button>
    </div>
</div>

<div id="invoiceTemplate" class="print-area">
    <div class="invoice-header">
        <h2>مركز صيانة نيوال (البصرة)</h2>
        <p>NEWAL SERVICE CENTER - EXCLUSIVE</p>
    </div>
    <table class="invoice-print">
        <tr><td><b>رقم الوصل:</b> <span id="p-ref"></span></td><td><b>التاريخ:</b> <span id="p-date"></span></td></tr>
        <tr><td><b>اسم الزبون:</b> <span id="p-name"></span></td><td><b>رقم الهاتف:</b> <span id="p-phone"></span></td></tr>
        <tr><td><b>الموديل:</b> <span id="p-model"></span></td><td><b>السيريال:</b> <span id="p-serial"></span></td></tr>
        <tr><td colspan="2"><b>حالة الضمان:</b> <span id="p-status"></span></td></tr>
    </table>
    <br>
    <div style="text-align: center;">_________________________<br>توقيع مسؤول الورشة</div>
</div>

<script>
    document.getElementById('dateReg').valueAsDate = new Date();
    
    function updatePrint() {
        document.getElementById('p-ref').innerText = document.getElementById('refNo').value;
        document.getElementById('p-date').innerText = document.getElementById('dateReg').value;
        document.getElementById('p-name').innerText = document.getElementById('custName').value;
        document.getElementById('p-phone').innerText = document.getElementById('phone').value;
        document.getElementById('p-model').innerText = document.getElementById('modelNo').value;
        document.getElementById('p-serial').innerText = document.getElementById('serialNo').value;
        document.getElementById('p-status').innerText = document.getElementById('status').value;
    }

    // تحديث تلقائي عند الطباعة
    window.onbeforeprint = updatePrint;

    function saveData() {
        let data = [document.getElementById('refNo').value, document.getElementById('custName').value, document.getElementById('status').value];
        let csvContent = "data:text/csv;charset=utf-8,\uFEFFرقم الفاتورة,الزبون,الحالة\n" + data.join(",");
        let link = document.createElement("a");
        link.href = encodeURI(csvContent);
        link.download = "سجل_" + document.getElementById('refNo').value + ".csv";
        link.click();
    }
</script>
</body>
</html>
